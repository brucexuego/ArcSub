name: Bug Report
description: Report a reproducible problem in ArcSub.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please keep public reports free of secrets, `.env` content, personal media, and full `runtime/` snapshots.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one or two sentences.
      placeholder: ArcSub stops responding when I start local translation after switching models.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Provide the smallest reproducible sequence.
      placeholder: |
        1. Open Translate
        2. Select a local model
        3. Start translation
        4. Stop
        5. Switch to another model
        6. Start again
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: ArcSub should cancel the previous task and start with the new model.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: Describe what actually happened, including any visible error text.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ArcSub Version
      description: App version, commit, or release tag if known.
      placeholder: 0.9.0
  - type: dropdown
    id: install_mode
    attributes:
      label: Install Mode
      options:
        - Packaged release
        - Source repository
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      description: Paste only the relevant excerpt. Remove secrets and personal paths if needed.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this report.
          required: true
        - label: I removed secrets, tokens, and private local data from this report.
          required: true
